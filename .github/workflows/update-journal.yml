name: Update Knowledge Corpus & Journal

on:
  push:
    paths:
      - 'ao-knowledge-hq-kit/**'
      - 'public/images/**'
  schedule:
    # Run every hour to check for scheduled posts
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Required to push changes

jobs:
  update-knowledge-and-journal:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
        
    - name: Process knowledge corpus and journal posts
      run: node scripts/build-knowledge.mjs

    - name: Update devotional index (planning list)
      run: node scripts/generate-devotional-index.mjs
      
    - name: Commit knowledge + devotional index changes (if any)
      id: corpus_commit
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/knowledge.json notes/DEVOTIONAL_INDEX.md
        if git diff --staged --quiet; then
          echo "committed=false" >> "$GITHUB_OUTPUT"
        else
          git commit -m "Auto-update: Process knowledge corpus and journal posts [skip ci]"
          echo "committed=true" >> "$GITHUB_OUTPUT"
        fi
      
    - name: Push changes
      if: steps.corpus_commit.outputs.committed == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
        force: false

    - name: Trigger hosting refresh (deploy hook)
      if: steps.corpus_commit.outputs.committed == 'true'
      env:
        VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      run: |
        if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
          echo "No deploy hook configured (VERCEL_DEPLOY_HOOK_URL). Skipping."
          exit 0
        fi
        echo "Triggering deploy hook..."
        curl -sS -X POST "$VERCEL_DEPLOY_HOOK_URL" >/dev/null

    # Backup for the 1am ET cron: if today’s devotional landed in knowledge.json after the cron
    # already ran, or deploy lagged, this sends using the built corpus (full post body).
    - name: Notify devotional subscribers (backup for 1am cron + deploy lag)
      if: success() && steps.corpus_commit.outputs.committed == 'true'
      env:
        PUBLIC_SITE_URL: https://www.archetypeoriginal.com
        NOTIFY_DELAY_MS: '90000'
        CRON_SECRET: ${{ secrets.CRON_SECRET }}
      run: node scripts/notify-todays-devotionals-from-corpus.mjs
